<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Comment Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .btn-sm {
            padding: 8px 15px;
            font-size: 14px;
        }
        .account-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .account-item .username {
            font-weight: 600;
            color: #333;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }
        .hashtag-chip {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
            margin: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .hashtag-chip:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        .hashtag-list {
            margin-top: 10px;
        }
        .log-area {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .log-time {
            color: #ffaa00;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }
        .stat-box .label {
            color: #666;
            font-size: 14px;
        }
        .flex {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .flex-grow {
            flex: 1;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🤖 Instagram Comment Bot</h1>
        <p>Automated commenting on health & wellness content</p>
    </div>

    <!-- Stats -->
    <div class="card">
        <h3>📊 Live Stats</h3>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="number" id="totalComments">0</div>
                <div class="label">Total Comments</div>
            </div>
            <div class="stat-box">
                <div class="number" id="activeAccounts">0</div>
                <div class="label">Active Accounts</div>
            </div>
            <div class="stat-box">
                <div class="number" id="postsProcessed">0</div>
                <div class="label">Posts Processed</div>
            </div>
            <div class="stat-box">
                <div class="number" id="botStatus">⏹</div>
                <div class="label">Bot Status</div>
            </div>
        </div>
    </div>

    <!-- Main Controls -->
    <div class="grid">
        <!-- Add Account -->
        <div class="card">
            <h3>➕ Add Account</h3>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="accUsername" placeholder="your_username" />
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="accPassword" placeholder="••••••••" />
            </div>
            <button class="btn btn-success btn-sm" onclick="addAccount()">Add Account</button>
            <div id="accountList" style="margin-top:15px;"></div>
        </div>

        <!-- Comment Settings -->
        <div class="card">
            <h3>💬 Comment Settings</h3>
            <div class="input-group">
                <label>Custom Comment</label>
                <textarea id="customComment">This is so helpful! Thanks for sharing this amazing health tip! 💪🌟</textarea>
            </div>
            <div class="input-group">
                <label>Delay (seconds)</label>
                <input type="number" id="commentDelay" value="120" min="30" max="600" />
                <small style="color:#666;">Recommended: 120-300 seconds</small>
            </div>
            <div class="input-group">
                <label>Max Comments Per Session</label>
                <input type="number" id="maxComments" value="10" min="1" max="50" />
            </div>
        </div>

        <!-- Hashtags -->
        <div class="card">
            <h3>🏷️ Target Hashtags</h3>
            <div class="input-group">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="hashtagInput" placeholder="health" />
                    <button class="btn btn-sm" onclick="addHashtag()">Add</button>
                </div>
            </div>
            <div class="hashtag-list" id="hashtagList"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="card">
        <div class="flex">
            <button class="btn flex-grow" onclick="startBot()">▶ Start Bot</button>
            <button class="btn btn-danger flex-grow" onclick="stopBot()">⏹ Stop Bot</button>
            <button class="btn btn-success flex-grow" onclick="saveSettings()">💾 Save Settings</button>
            <button class="btn flex-grow" onclick="clearLogs()">🗑 Clear Logs</button>
        </div>
    </div>

    <!-- Logs -->
    <div class="card">
        <h3>📝 Activity Log</h3>
        <div class="log-area" id="logArea">
            <div class="log-entry"><span class="log-time">[System]</span> Bot initialized. Ready to start.</div>
        </div>
    </div>
</div>

<script>
    // ==================== STATE ====================
    let accounts = [];
    let hashtags = ['health', 'wellness', 'fitness', 'nutrition', 'mentalhealth'];
    let commentHistory = 0;
    let postsProcessed = 0;
    let botRunning = false;

    // ==================== DASHBOARD FUNCTIONS ====================

    function addAccount() {
        const username = document.getElementById('accUsername').value.trim();
        const password = document.getElementById('accPassword').value.trim();
        
        if (!username || !password) {
            addLog('❌ Please enter both username and password');
            return;
        }

        accounts.push({ username, password, status: 'active' });
        document.getElementById('accUsername').value = '';
        document.getElementById('accPassword').value = '';
        renderAccounts();
        updateStats();
        addLog(`✅ Account ${username} added`);
    }

    function renderAccounts() {
        const list = document.getElementById('accountList');
        if (accounts.length === 0) {
            list.innerHTML = '<p style="color:#666;">No accounts added yet</p>';
            return;
        }
        list.innerHTML = accounts.map((acc, index) => `
            <div class="account-item">
                <span>
                    <span class="username">${acc.username}</span>
                    <span class="status-badge ${acc.status === 'active' ? 'status-active' : 'status-inactive'}">${acc.status}</span>
                </span>
                <button onclick="removeAccount(${index})" style="background:red;color:white;border:none;border-radius:5px;padding:5px 10px;cursor:pointer;">✕</button>
            </div>
        `).join('');
    }

    function removeAccount(index) {
        accounts.splice(index, 1);
        renderAccounts();
        updateStats();
        addLog('🗑 Account removed');
    }

    function addHashtag() {
        const input = document.getElementById('hashtagInput');
        const tag = input.value.trim().toLowerCase();
        if (tag && !hashtags.includes(tag)) {
            hashtags.push(tag);
            renderHashtags();
            addLog(`🏷️ Added hashtag: #${tag}`);
        }
        input.value = '';
    }

    function removeHashtag(tag) {
        hashtags = hashtags.filter(h => h !== tag);
        renderHashtags();
        addLog(`🗑 Removed hashtag: #${tag}`);
    }

    function renderHashtags() {
        const list = document.getElementById('hashtagList');
        if (hashtags.length === 0) {
            list.innerHTML = '<p style="color:#666;">No hashtags added</p>';
            return;
        }
        list.innerHTML = hashtags.map(tag => `
            <span class="hashtag-chip" onclick="removeHashtag('${tag}')">#${tag}</span>
        `).join('');
    }

    // ==================== BOT CONTROLS ====================

    function startBot() {
        if (accounts.length === 0) {
            addLog('❌ Please add at least one account first!');
            return;
        }

        if (hashtags.length === 0) {
            addLog('❌ Please add at least one hashtag!');
            return;
        }

        const comment = document.getElementById('customComment').value || "Great content! 💪";
        const delay = parseInt(document.getElementById('commentDelay').value) || 120;
        const maxComments = parseInt(document.getElementById('maxComments').value) || 10;

        fetch('/api/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                accounts: accounts,
                hashtags: hashtags,
                comment: comment,
                delay: delay,
                max_comments: maxComments
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                botRunning = true;
                document.getElementById('botStatus').textContent = '▶ RUNNING';
                addLog(`🚀 Bot started! Targeting ${hashtags.length} hashtags with ${accounts.length} accounts`);
                updateStats();
            } else {
                addLog(`❌ Failed to start: ${data.error || 'Unknown error'}`);
            }
        })
        .catch(err => {
            addLog(`❌ Error: ${err.message}`);
            simulateBotLocally();
        });
    }

    function stopBot() {
        fetch('/api/stop', {
            method: 'POST'
        })
        .then(res => res.json())
        .then(data => {
            botRunning = false;
            document.getElementById('botStatus').textContent = '⏹ STOPPED';
            addLog('⏹ Bot stopped');
        })
        .catch(() => {
            botRunning = false;
            document.getElementById('botStatus').textContent = '⏹ STOPPED';
            addLog('⏹ Bot stopped (local)');
        });
    }

    function simulateBotLocally() {
        addLog('⚠️ Running in local simulation mode');
        let count = 0;
        const maxComments = parseInt(document.getElementById('maxComments').value) || 10;
        const delay = parseInt(document.getElementById('commentDelay').value) || 120;
        
        function doComment() {
            if (!botRunning || count >= maxComments) {
                if (count >= maxComments) {
                    addLog('✅ Session complete!');
                    document.getElementById('botStatus').textContent = '⏹ COMPLETED';
                }
                return;
            }
            
            const randomAccount = accounts[Math.floor(Math.random() * accounts.length)];
            const randomHashtag = hashtags[Math.floor(Math.random() * hashtags.length)];
            const comment = document.getElementById('customComment').value || "Great content! 💪";
            
            count++;
            commentHistory++;
            postsProcessed++;
            updateStats();
            
            addLog(`💬 [${randomAccount.username}] on #${randomHashtag}: "${comment.substring(0, 30)}..."`);
            
            setTimeout(doComment, delay * 1000 + Math.random() * 30000);
        }
        
        doComment();
    }

    function saveSettings() {
        const settings = {
            accounts: accounts,
            hashtags: hashtags,
            comment: document.getElementById('customComment').value,
            delay: document.getElementById('commentDelay').value,
            max_comments: document.getElementById('maxComments').value
        };

        fetch('/api/save_settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(settings)
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                addLog('💾 Settings saved successfully!');
            }
        })
        .catch(() => {
            localStorage.setItem('botSettings', JSON.stringify(settings));
            addLog('💾 Settings saved locally');
        });
    }

    function loadSettings() {
        const saved = localStorage.getItem('botSettings');
        if (saved) {
            try {
                const settings = JSON.parse(saved);
                accounts = settings.accounts || [];
                hashtags = settings.hashtags || ['health', 'wellness', 'fitness'];
                document.getElementById('customComment').value = settings.comment || '';
                document.getElementById('commentDelay').value = settings.delay || 120;
                document.getElementById('maxComments').value = settings.max_comments || 10;
                renderAccounts();
                renderHashtags();
                updateStats();
                addLog('📂 Settings loaded');
            } catch (e) {
                addLog('⚠️ Failed to load settings');
            }
        }
    }

    // ==================== UTILITIES ====================

    function updateStats() {
        document.getElementById('totalComments').textContent = commentHistory;
        document.getElementById('activeAccounts').textContent = accounts.filter(a => a.status === 'active').length;
        document.getElementById('postsProcessed').textContent = postsProcessed;
    }

    function addLog(message) {
        const logArea = document.getElementById('logArea');
        const time = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
        logArea.appendChild(entry);
        logArea.scrollTop = logArea.scrollHeight;
    }

    function clearLogs() {
        document.getElementById('logArea').innerHTML = '';
        addLog('🗑 Logs cleared');
    }

    // ==================== INIT ====================

    loadSettings();
    renderHashtags();
    addLog('🎯 Dashboard ready! Add accounts and start the bot.');

    setInterval(() => {
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                if (data.running) {
                    document.getElementById('botStatus').textContent = '▶ RUNNING';
                }
                if (data.stats) {
                    document.getElementById('totalComments').textContent = data.stats.total_comments || 0;
                    document.getElementById('postsProcessed').textContent = data.stats.posts_processed || 0;
                }
            })
            .catch(() => {});
    }, 5000);
</script>

</body>
  </html>
